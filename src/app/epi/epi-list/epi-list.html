<section class="conteiner">
    <article>
<h2>Lista de equipamentos de proteção individual</h2>
</article>
<table class="table table-striped table-bordered table-hover">
    <thead class="table-dark">
    <tr>
    <th>Nome do EPI</th>
    <th>Categoria</th>
    <th>CA</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let epi of epis">       
    <td>{{ epi.nome }}</td>
    <td>{{ epi.categoria }}</td>
    <td>{{ epi.ca }}</td>
    </tr>
    </tbody>
    </table>
<div>
<button class="btn btn-sm btn-primary ms-2 mt-1">Comprar</button>
<a routerLink="/epi" class="btn btn-sm btn-primary ms-2 mt-1">
    Mostrar lista
  </a>
<a routerLink="/epi/detalhe" class="btn btn-sm btn-primary ms-2 mt-1">
    Ver detalhes
  </a>
  <a [routerLink]="['/epi/detalhe']" [queryParams]="{ id: 1 }" class="btn btn-sm btn-primary ms-2 mt-1">
    Enviar ID
   </a>
   <a routerLink="/login" class="btn btn-sm btn-primary ms-2 mt-1">login de usuario</a>
</div>
</section>
